<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng Kẹo Ngọt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #fff7fb;
            font-family: Arial, sans-serif;
        }

        .cart-box {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(255, 143, 171, 0.15);
        }

        .title {
            color: #ff4d6d;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
        }

        table {
            overflow: hidden;
            border-radius: 20px;
        }

        thead {
            background: #ff8fab;
            color: white;
        }

        tbody tr:hover {
            background: #fff0f5;
            transition: 0.3s;
        }

        .product-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 15px;
        }

        .price {
            color: #28a745;
            font-weight: bold;
        }

        .total {
            color: #ff1744;
            font-size: 20px;
            font-weight: bold;
        }

        .btn-delete {
            background: #ff4d6d;
            border: none;
            border-radius: 12px;
        }

        .btn-delete:hover {
            background: #ff1744;
        }

        .btn-pay {
            background: #4dabf7;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            padding: 10px 20px;
        }

        .btn-pay:hover {
            background: #339af0;
        }

        tfoot td {
            vertical-align: middle;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container my-5">

        <div class="cart-box">

            <h2 class="title">🍭 GIỎ HÀNG KẸO NGỌT</h2>

            <table class="table align-middle text-center">

                <thead>
                    <tr>
                        <th>STT</th>
                        <th>TÊN SẢN PHẨM</th>
                        <th>HÌNH</th>
                        <th>ĐƠN GIÁ</th>
                        <th>SỐ LƯỢNG</th>
                        <th>THÀNH TIỀN</th>
                        <th>XÓA</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>01</td>

                        <td>Kẹo Gấu Gummy</td>

                        <td>
                            <img src="./images/sp1.jpg"
                                class="product-img">
                        </td>

                        <td class="price">25.000đ</td>

                        <td>2</td>

                        <td class="price">50.000đ</td>

                        <td>
                            <button class="btn btn-delete text-white">
                                ✖
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>02</td>

                        <td>Kẹo Marshmallow</td>

                        <td>
                            <img src="./images/sp3.jpg"
                                class="product-img">
                        </td>

                        <td class="price">28.000đ</td>

                        <td>1</td>

                        <td class="price">28.000đ</td>

                        <td>
                            <button class="btn btn-delete text-white">
                                ✖
                            </button>
                        </td>
                    </tr>

                </tbody>

                <tfoot>
                    <tr>
                        <td colspan="4">
                            💖 TỔNG THANH TOÁN
                        </td>

                        <td>3</td>

                        <td class="total">
                            78.000đ
                        </td>

                        <td>
                            <button class="btn btn-pay text-white">
                                🛍️ Thanh Toán
                            </button>
                        </td>
                    </tr>
                </tfoot>

            </table>

        </div>

    </div>

</body>

</html>
